<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="blob" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- Organic blob -->
  <path d="M256 78
           C 330 78, 395 115, 415 180
           C 435 245, 425 315, 385 365
           C 345 415, 275 445, 210 430
           C 145 415, 90 365, 82 295
           C 74 225, 95 155, 145 110
           C 175 82, 215 78, 256 78 Z"
        fill="url(#blob)" opacity="0.92" filter="url(#glow)"/>

  <!-- Inner analytics ring -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.25"/>
  <circle cx="256" cy="256" r="65" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.18"/>
  <circle cx="256" cy="256" r="32" fill="#ffffff" opacity="0.12"/>

  <!-- Arc segments hinting at pie chart -->
  <path d="M 256 156 A 100 100 0 0 1 345 210" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <path d="M 345 302 A 100 100 0 0 1 256 356" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.2"/>
</svg>
